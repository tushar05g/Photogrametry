<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORPHIC - Pro 3D Scanning</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #9d50bb;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .container {
            width: 90%;
            max-width: 450px;
            margin-top: 2rem;
            padding-bottom: 100px;
        }

        .intro-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        h2 {
            font-weight: 600;
            margin-top: 0;
            color: #fff;
        }

        p {
            font-weight: 300;
            color: #94a3b8;
            line-height: 1.6;
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 2rem;
            margin: 1.5rem 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(0, 210, 255, 0.05);
        }

        #imageInput {
            display: none;
        }

        .file-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: #cbd5e1;
        }

        .icon-box {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        .main-btn {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(157, 80, 187, 0.4);
            transition: transform 0.2s;
        }

        .main-btn:active {
            transform: scale(0.98);
        }

        .main-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #status {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.4),
                    transparent);
            animation: scan 1.5s infinite;
        }

        @keyframes scan {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .scanning-active .progress-bar {
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            font-weight: 600;
            margin-top: 10px;
        }

        .nav-bar {
            position: fixed;
            bottom: 20px;
            width: 90%;
            max-width: 400px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .nav-item {
            color: #64748b;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">MORPHIC</div>
    </div>

    <div class="container">
        <div class="intro-card">
            <h2>Start New Scan</h2>
            <p>Upload photos of your object with a coin for automatic scaling.</p>

            <div class="upload-area" onclick="document.getElementById('imageInput').click()">
                <div class="file-label">
                    <div class="icon-box">
                        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z">
                            </path>
                            <circle cx="12" cy="13" r="4"></circle>
                        </svg>
                    </div>
                    <span id="fileCountText">Choose Photos</span>
                </div>
                <input type="file" id="imageInput" multiple accept="image/*" onchange="updateFileLabel()">
            </div>

            <button class="main-btn" id="uploadBtn">Upload to Cloud</button>

            <div class="progress-container" id="progContainer">
                <div class="progress-bar" id="progBar"></div>
            </div>

            <div id="status"></div>

            <div id="resultArea"
                style="display: none; margin-top: 20px; border-top: 1px solid var(--glass-border); padding-top: 20px;">
                <p style="color: #4ade80; font-weight: 600;">✨ 3D Model Ready!</p>
                <a id="downloadLink" href="#" target="_blank" class="main-btn"
                    style="text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; background: #22c55e;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Download .OBJ
                </a>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            </svg>
            <span>Scan</span>
        </div>
        <div class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="3" y1="9" x2="21" y2="9"></line>
                <line x1="9" y1="21" x2="9" y2="9"></line>
            </svg>
            <span>Library</span>
        </div>
        <div class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>Profile</span>
        </div>
    </div>

    <script>
        function updateFileLabel() {
            const input = document.getElementById('imageInput');
            const label = document.getElementById('fileCountText');
            if (input.files.length > 0) {
                label.innerText = `${input.files.length} Photos Selected`;
                label.style.color = "#00d2ff";
            }
        }

        const uploadBtn = document.getElementById('uploadBtn');
        const statusDiv = document.getElementById('status');
        const imageInput = document.getElementById('imageInput');
        const progContainer = document.getElementById('progContainer');
        const progBar = document.getElementById('progBar');
        const resultArea = document.getElementById('resultArea');
        const downloadLink = document.getElementById('downloadLink');

        let currentJobId = null;

        async function checkStatus() {
            if (!currentJobId) return;

            try {
                const response = await fetch(`/scans/${currentJobId}`);
                const job = await response.json();

                if (job.status === 'completed') {
                    statusDiv.innerHTML = `<div class="status-badge" style="background: rgba(34, 197, 94, 0.2); color: #4ade80;">Success: Scan Complete</div>`;
                    resultArea.style.display = "block";
                    downloadLink.href = job.model_url;
                    progBar.style.width = "100%";
                    progContainer.classList.remove('scanning-active');
                } else if (job.status === 'failed') {
                    statusDiv.innerHTML = `<p style="color: #ef4444;">Processing Failed: ${job.error_message || "Unknown error"}</p>`;
                    progContainer.classList.remove('scanning-active');
                } else if (job.status === 'processing') {
                    statusDiv.innerHTML = `<p style="color: var(--primary);">🏗️ Kaggle is building your 3D model... (5-10 mins)</p>`;
                    progBar.style.width = "85%";
                    progContainer.classList.add('scanning-active');
                    setTimeout(checkStatus, 15000); // Check every 15 seconds
                } else if (job.status === 'pending') {
                    statusDiv.innerHTML = `<p style="color: #94a3b8;">🛰️ Sent to Kaggle! Waiting for GPU to wake up...</p>`;
                    progBar.style.width = "60%";
                    setTimeout(checkStatus, 5000);
                } else if (job.status === 'uploading') {
                    statusDiv.innerHTML = `<p style="color: #94a3b8;">☁️ Syncing high-res photos to Cloud...</p>`;
                    progBar.style.width = "40%";
                    setTimeout(checkStatus, 3000);
                } else {
                    // Initializing
                    statusDiv.innerHTML = `<p style="color: #94a3b8;">⚡️ Preparing Morphic Bridge...</p>`;
                    progBar.style.width = "20%";
                    setTimeout(checkStatus, 2000);
                }
            } catch (err) {
                console.error("Status check failed", err);
                setTimeout(checkStatus, 5000);
            }
        }

        uploadBtn.addEventListener('click', async () => {
            const files = imageInput.files;
            if (files.length === 0) {
                alert('Select photos of your object first!');
                return;
            }

            const formData = new FormData();
            for (let i = 0; i < files.length; i++) {
                formData.append('files', files[i]);
            }

            uploadBtn.disabled = true;
            progContainer.style.display = "block";
            progBar.style.width = "10%";
            statusDiv.innerHTML = "<p>Initiating Neural Uplink...</p>";

            try {
                const response = await fetch('/scans/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                progBar.style.width = "100%";

                if (response.ok) {
                    currentJobId = result.job_id;
                    statusDiv.innerHTML = `
                        <div class="status-badge">Images Online</div>
                        <p style="color: #cbd5e1; margin-top: 15px;">Waiting for Kaggle to start...</p>
                        <p style="color: var(--primary); font-weight: 600;">${result.message}</p>
                    `;
                    checkStatus(); // Start polling for the 3D result!
                } else {
                    statusDiv.innerHTML = `<p style="color: #ef4444;">Error: ${result.detail || "Upload failed"}</p>`;
                }
            } catch (err) {
                statusDiv.innerHTML = `<p style="color: #ef4444;">Interlink Failure: ${err.message}</p>`;
            } finally {
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>

</html>

services:
  # 🌐 The FastApi Web Server
  api:
    build: .
    container_name: scanner_api
    environment:
      - ROLE=api
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    ports:
      - "8000:8000"
    volumes:
      - ./output:/code/output
      - ./logs:/code/logs
    depends_on:
      redis:
        condition: service_healthy

  # ⚙️ Parallel CPU Workers
  worker:
    build: .
    environment:
      - ROLE=worker
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - OUTPUT_DIR=/code/output
    volumes:
      - ./output:/code/output
      - ./logs:/code/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 📦 Task Broker
  redis:
    image: redis:alpine
    container_name: scanner_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 🌍 Ngrok for Mobile Testing (Optional)
  ngrok:
    image: ngrok/ngrok:latest
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http api:8000
    depends_on:
      - api
    ports:
      - "4040:4040"

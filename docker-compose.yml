services:
  api:
    build: .
    container_name: scanner_api
    # Run the Uvicorn server from the new backend location
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    dns:
      - 8.8.8.8

  redis:
    image: redis:7-alpine
    container_name: scanner_redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  ngrok:
    image: ngrok/ngrok:latest
    container_name: scanner_ngrok
    depends_on:
      - api
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - http
      - api:8000
    ports:
      - "4040:4040"
    dns:
      - 8.8.8.8

volumes:
  redis_data:
